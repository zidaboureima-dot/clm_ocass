workflows:
  default-workflow:
    name: CLM/OCASS Build
    instance_type: mac_mini_m2
    environment:
      flutter: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch:
        - main
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/apk/release/app-release.apk
